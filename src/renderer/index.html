<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;" />
  <title>PxG Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/variables.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/tasks.css" />
  <link rel="stylesheet" href="styles/accounts.css" />
  <link rel="stylesheet" href="styles/characters.css" />
  <link rel="stylesheet" href="styles/houses.css" />
  <link rel="stylesheet" href="styles/energy.css" />
</head>
<body>
  <!-- Custom Titlebar -->
  <div class="titlebar">
    <button class="hamburger-btn" onclick="toggleSidebar()" title="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="titlebar-drag">
      <span class="titlebar-logo">⚔</span>
      <span class="titlebar-title">PxG Helper</span>
    </div>
    <div class="titlebar-controls">
      <button onclick="window.api.minimize()" title="Minimizar">─</button>
      <button onclick="window.api.maximize()" title="Maximizar">□</button>
      <button onclick="window.api.close()" class="close-btn" title="Fechar">✕</button>
    </div>
  </div>

  <!-- Layout -->
  <div class="layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="nav-items">
        <button class="nav-btn active" data-page="login" onclick="navigate('login')">
          <span class="nav-icon">🔑</span>
          <span>Login</span>
        </button>
        <button class="nav-btn" data-page="personagens"
          onclick="navigate('personagens'); loadCharacters()">
          <span class="nav-icon">🧙</span>
          <span>Personagens</span>
        </button>
        <button class="nav-btn" data-page="houses" onclick="navigate('houses'); loadHouses()">
          <span class="nav-icon">🏠</span>
          <span>Houses</span>
        </button>
        <button class="nav-btn" data-page="tasks" onclick="navigate('tasks'); loadTasks()">
          <span class="nav-icon">☑</span>
          <span>Tasks</span>
        </button>
        <button class="nav-btn" data-page="config" onclick="navigate('config')">
          <span class="nav-icon">⚙</span>
          <span>Config</span>
        </button>
      </div>
      <div class="sidebar-footer">v0.8.3</div>
    </nav>

    <!-- Main content -->
    <main class="content">

      <!-- AUTO-LOGIN PAGE -->
      <section id="page-login" class="page active">
        <div class="page-header">
          <h1>Login</h1>
        </div>
        <div id="account-list" class="account-list"></div>
        <div id="login-status" class="status-msg"></div>
      </section>

      <!-- TASKS PAGE -->
      <section id="page-tasks" class="page">
        <div class="page-header">
          <h1>Tasks</h1>
          <span class="badge" id="tasks-counter">0/0</span>
        </div>
        <div class="task-tab-bar">
          <button class="task-tab active" data-tab="all"  onclick="switchTaskTab('all')">Tasks</button>
          <button class="task-tab" id="tab-btn-red"  data-tab="red"  onclick="switchTaskTab('red')"> Vermelha</button>
          <button class="task-tab" id="tab-btn-blue" data-tab="blue" onclick="switchTaskTab('blue')"> Azul</button>
        </div>

        <!-- Tasks tab -->
        <div id="task-tab-all" class="task-tab-content">
          <select id="task-char-select" class="energy-char-select" onchange="renderTasks()"></select>
          <div class="task-form">
            <div class="task-input-row">
              <input type="text" id="task-input" placeholder="Nova task..." maxlength="120" />
              <button class="btn-primary" onclick="addTask()">+ Adicionar</button>
            </div>
            <div class="task-options-row">
              <select id="task-type" class="task-type-select">
                <option value="daily">Diária</option>
                <option value="weekly">Semanal</option>
                <option value="monthly">Mensal</option>
              </select>
              <label class="task-server-save-label">
                <input type="checkbox" id="task-server-save" />
                Reseta no Server Save
              </label>
            </div>
          </div>
          <div id="task-list" class="task-list"></div>
          <button class="task-show-disabled" onclick="toggleDisabledSection()">Mostrar desativadas</button>
          <div id="task-disabled-section" class="task-disabled-section" style="display:none">
            <div id="task-disabled-list"></div>
          </div>
        </div>

        <!-- Blue tab -->
        <div id="task-tab-blue" class="task-tab-content hidden">
          <select id="energy-char-select-blue" class="energy-char-select"
            onchange="renderEnergyTab('blue')"></select>
          <div id="energy-list-blue"></div>
        </div>

        <!-- Red tab -->
        <div id="task-tab-red" class="task-tab-content hidden">
          <select id="energy-char-select-red" class="energy-char-select"
            onchange="renderEnergyTab('red')"></select>
          <div id="energy-list-red"></div>
        </div>
      </section>

      <!-- PERSONAGENS PAGE -->
      <section id="page-personagens" class="page">
        <div class="page-header">
          <h1>Personagens</h1>
        </div>
        <div id="char-grid" class="char-grid"></div>
        <div id="char-edit-area"></div>
      </section>

      <!-- HOUSES PAGE -->
      <section id="page-houses" class="page">
        <div class="page-header">
          <h1>Houses</h1>
          <button class="btn-primary" onclick="showAddHouseForm()">+ Adicionar House</button>
        </div>
        <div id="add-house-form" class="add-house-form" style="display:none">
          <select id="house-char-select"></select>
          <div class="house-form-row">
            <input type="number" id="house-bid-day" placeholder="Dia do BID" min="1" max="28" />
            <input type="number" id="house-value"   placeholder="Valor" min="0" />
          </div>
          <label class="house-cp-label">
            <input type="checkbox" id="house-cp-checkbox" />
            Valor separado no CP
          </label>
          <div id="house-form-status" class="status-msg"></div>
          <div class="house-form-btns">
            <button class="btn-primary"   onclick="addHouse()">Salvar</button>
            <button class="btn-secondary" onclick="hideAddHouseForm()">Cancelar</button>
          </div>
        </div>
        <div id="house-list"></div>
      </section>

      <!-- CONFIG PAGE -->
      <section id="page-config" class="page">
        <div class="page-header">
          <h1>Config</h1>
        </div>

        <!-- Contas -->
        <div class="card">
          <div class="accounts-header">
            <span class="field-label" style="margin:0">Contas</span>
            <button class="btn-add-account" onclick="showAddAccountForm()">+ Adicionar</button>
          </div>

          <div id="add-account-form" class="add-account-form" style="display:none">
            <input type="text" id="new-acc-name" placeholder="Nome (ex: Main)" maxlength="30" />
            <input type="text" id="new-acc-user" placeholder="Usuário / E-mail" autocomplete="off" />
            <div class="pass-row">
              <input type="password" id="new-acc-pass" placeholder="Senha" autocomplete="off" />
              <button class="btn-icon" onclick="toggleNewPass()" title="Mostrar/ocultar">👁</button>
            </div>
            <div id="add-account-status" class="status-msg"></div>
            <div class="add-account-btns">
              <button class="btn-primary" onclick="addAccount()">Salvar</button>
              <button class="btn-secondary" onclick="hideAddAccountForm()">Cancelar</button>
            </div>
          </div>

          <div id="accounts-config-list"></div>
        </div>

        <!-- Jogo -->
        <div class="card">
          <label class="field-label">Executável do jogo</label>
          <div class="path-row">
            <input type="text" id="game-path" placeholder="C:\...\game.exe" readonly />
            <button class="btn-secondary" onclick="browseGame()">Procurar</button>
          </div>
          <div class="launch-actions">
            <button class="btn-launch" onclick="launchGame()">▶ Abrir PxG</button>
          </div>
          <div id="launcher-status" class="status-msg"></div>
        </div>

        <!-- Delay -->
        <div class="card">
          <label class="field-label">
            Delay do auto-login: <strong id="delay-label">3000ms</strong>
          </label>
          <input type="range" id="delay-slider" min="500" max="10000" step="500" value="3000"
            oninput="updateDelay(this.value)" class="slider" />
          <div class="delay-hint">Tempo de espera antes de digitar as credenciais</div>
        </div>

        <!-- Pasta de dados -->
        <div class="card">
          <label class="field-label">Pasta de dados</label>
          <div class="path-row">
            <input type="text" id="data-path" placeholder="Carregando..." readonly />
            <button class="btn-secondary" onclick="openDataFolder()">Abrir pasta</button>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- Confirm modal -->
  <div id="confirm-modal" class="modal-backdrop" style="display:none" onclick="if(event.target===this)hideConfirmModal()">
    <div class="modal-box">
      <p id="confirm-modal-msg" class="modal-msg"></p>
      <div class="modal-actions">
        <button id="confirm-modal-ok"     class="btn-danger">Sim</button>
        <button id="confirm-modal-cancel" class="btn-confirm-cancel" onclick="hideConfirmModal()">Sair</button>
      </div>
    </div>
  </div>

  <!-- Tier picker modal -->
  <div id="tier-picker-modal" class="modal-backdrop" style="display:none"
    onclick="if(event.target===this)cancelTierPicker()">
    <div class="modal-box">
      <p id="tier-picker-title" class="modal-msg"></p>
      <div id="tier-picker-list" class="tier-picker-list"></div>
      <button class="btn-secondary" onclick="cancelTierPicker()">Cancelar</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="modules/tasks.js"></script>
  <script src="modules/accounts.js"></script>
  <script src="modules/characters.js"></script>
  <script src="modules/houses.js"></script>
  <script src="modules/config.js"></script>
  <script>
    (async function () {
      await loadTasks();
      await loadAccounts();
      await loadConfig();
      // Check for task resets every minute while the app is open
      setInterval(loadTasks, 15 * 60 * 1000);
    })();
  </script>
</body>
</html>
